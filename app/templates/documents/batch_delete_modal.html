<!-- ✅ МОДАЛЬНОЕ ОКНО: Подтверждение массового удаления -->
<div id="batchDeleteModal"
    class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">🗑️ Удаление документов</h3>
            <button onclick="document.getElementById('batchDeleteModal').classList.add('hidden')"
                class="text-gray-500 hover:text-gray-700 text-2xl">
                ×
            </button>
        </div>

        <div class="space-y-4">
            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg">
                <p class="text-red-700">
                    ⚠️ Вы уверены, что хотите удалить
                    <strong id="batchDeleteCount">0</strong> документ(ов)?
                </p>
                <p class="text-sm text-red-600 mt-1">Это действие необратимо.</p>
            </div>

            <div id="batchDeleteList" class="max-h-48 overflow-y-auto space-y-1"></div>

            <div class="flex gap-4 pt-4">
                <button type="button" onclick="confirmBatchDelete()"
                    class="flex-1 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                    🗑️ Удалить
                </button>
                <button type="button"
                    onclick="document.getElementById('batchDeleteModal').classList.add('hidden')"
                    class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Отмена
                </button>
            </div>
        </div>
    </div>
</div>
