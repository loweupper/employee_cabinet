<!-- ✅ МОДАЛЬНОЕ ОКНО: Редактирование документа -->
<div id="editDocumentModal"
    class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">✏️ Редактировать документ</h3>
            <button onclick="closeEditDocumentModal()"
                class="text-gray-500 hover:text-gray-700 text-2xl">×</button>
        </div>

        <!-- Редактирование метаданных -->
        <form id="editDocumentForm" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium mb-2">Название *</label>
                <input type="text" id="editDocTitle" name="title" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-2">Раздел *</label>
                <select id="editDocCategory" name="category" required
                    onchange="updateEditSubcategories()"
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500">
                    <option value="general">📋 Общие</option>
                    <option value="technical">📐 Технические</option>
                    <option value="accounting">💰 Бухгалтерия</option>
                    <option value="safety">👷 Охрана труда</option>
                    <option value="legal">⚖️ Юридические</option>
                    <option value="hr">👔 Кадровые</option>
                </select>
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-2">Подкатегория</label>
                <select id="editDocSubcategory" name="subcategory_id"
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500">
                    <option value="">Без подкатегории</option>
                </select>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                    class="flex-1 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                    ✓ Сохранить
                </button>
                <button type="button" onclick="closeEditDocumentModal()"
                    class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Отмена
                </button>
            </div>
        </form>

        <!-- Обновление файла (версионирование) -->
        {% if object.created_by == user.id or user.role == "admin" %}
        <div class="mt-6 pt-6 border-t">
            <h4 class="font-medium text-gray-700 mb-3">🔄 Обновить файл (новая версия)</h4>
            <input type="file" id="editDocFileInput" class="hidden"
                accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"
                onchange="document.getElementById('editDocFileInputName').textContent = this.files[0] ? this.files[0].name : 'Файл не выбран'; document.getElementById('editDocUpdateFileBtn').classList.remove('hidden');">
            <div class="flex items-center gap-3 mb-2">
                <button type="button"
                    onclick="document.getElementById('editDocFileInput').click()"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-sm">
                    📁 Выбрать файл
                </button>
                <span id="editDocFileInputName" class="text-gray-500 text-sm">Файл не выбран</span>
            </div>
            <button type="button" id="editDocUpdateFileBtn"
                onclick="updateDocumentFile()"
                class="hidden w-full py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                ⬆️ Загрузить новую версию
            </button>
        </div>
        {% endif %}
    </div>
</div>
