<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>

    <!-- Tailwind CDN -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/output.css') }}">

    <!-- Плавные анимации -->
    <style>
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glow {
            transition: box-shadow 0.3s ease;
        }
        .glow:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 fade-in">

    <h2 class="text-3xl font-semibold text-gray-800 text-center mb-6">
        Добро пожаловать 👋
    </h2>

    <p class="text-center text-gray-500 mb-8">
        Войдите в свой аккаунт, чтобы продолжить
    </p>

    <!-- ✅ Success message (после регистрации) -->
    {% if success %}
    <div class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded-lg fade-in">
        <p class="font-semibold">{{ success }}</p>
    </div>
    {% endif %}

    <!-- ❌ Error message -->
    {% if error %}
    <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-lg fade-in">
        <div class="flex items-start">
            <svg class="w-6 h-6 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <div>
                <p class="font-semibold">Ошибка входа</p>
                <p class="text-sm">{{ error }}</p>
            </div>
        </div>
    </div>
    {% endif %}

    <!-- Форма -->
    <form method="post" action="/api/v1/auth/login" class="space-y-6">

        <div>
            <label for="email" class="block text-gray-700 mb-1">Email</label>
            <input
                type="email"
                name="email"
                id="email"
                required autocomplete="username"
                value="{{ email or '' }}"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 glow focus:border-indigo-500"
                placeholder="you@example.com"
            >
        </div>

        <div>
            <label for="password" class="block text-gray-700 mb-1">Пароль</label>
            <input
                type="password"
                name="password"
                id="password"
                required autocomplete="current-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 glow focus:border-indigo-500"
                placeholder="••••••••"
            >
        </div>

        <button
            type="submit"
            class="w-full py-3 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition-all shadow-md hover:shadow-lg"
        >
            Войти
        </button>
    </form>

    <div class="text-center mt-6">
        <a href="/api/v1/auth/register-page" class="text-indigo-600 hover:underline">
            Создать аккаунт
        </a>
    </div>

</div>

</body>
</html>
