<!-- ✅ МОДАЛЬНОЕ ОКНО: Создание подкатегории (AJAX) -->
<div id="createSubcategoryModal"
    class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">➕ Создать подкатегорию</h3>
            <button onclick="document.getElementById('createSubcategoryModal').classList.add('hidden')"
                class="text-gray-500 hover:text-gray-700 text-2xl">
                ×
            </button>
        </div>

        <form id="createSubcategoryForm" onsubmit="createSubcategoryViaAjax(event)" class="space-y-4">

            <div>
                <label for="subcategoryName" class="block text-gray-700 font-medium mb-2">Название подкатегории *</label>
                <input type="text" id="subcategoryName" name="name" autocomplete="off" required
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                    placeholder="Например: УПД, Счета-фактуры, Чертежи">
            </div>

            <div>
                <label for="subcategoryDescription" class="block text-gray-700 font-medium mb-2">Описание</label>
                <textarea id="subcategoryDescription" name="description" rows="2"
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
                    placeholder="Опциональное описание..."></textarea>
            </div>

            <!-- ✅ ИСПРАВЛЕНО: Убран лишний div и добавлен правильный контейнер -->
            <div>
                <div class="block text-gray-700 font-medium mb-2">Раздел *</div>
                <input type="hidden" name="category" id="subcatCategory" value="">
                <div id="subcatCategoryDisplay"
                    class="px-4 py-2 rounded-lg border border-gray-300 bg-gray-50 text-gray-700"
                    aria-label="Выбранный раздел">
                    Выберите раздел в форме загрузки выше
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit"
                    class="flex-1 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                    ✓ Создать
                </button>
                <button type="button"
                    onclick="document.getElementById('createSubcategoryModal').classList.add('hidden')"
                    class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                    Отмена
                </button>
            </div>

        </form>
    </div>
</div>

<!-- ✅ МОДАЛЬНОЕ ОКНО: Редактирование подкатегории -->
<div
  id="editSubcategoryModal"
  class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-bold text-gray-800">
        ✏️ Редактировать подкатегорию
      </h3>
      <button
        onclick="closeEditSubcategoryModal()"
        class="text-gray-500 hover:text-gray-700 text-2xl">
        ×
      </button>
    </div>

    <form id="editSubcategoryForm" method="post" class="space-y-4">
      <div>
        <label for="editSubcatName" class="block text-gray-700 font-medium mb-2"
          >Название *</label
        >
        <input
          type="text"
          id="editSubcatName"
          name="name"
          autocomplete="off"
          required
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500" />
      </div>

      <div>
        <label for="editSubcatDesc" class="block text-gray-700 font-medium mb-2"
          >Описание</label
        >
        <textarea
          id="editSubcatDesc"
          name="description"
          rows="2"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500"></textarea>
      </div>

      <div class="flex gap-4 pt-4">
        <button
          type="submit"
          class="flex-1 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
          ✓ Сохранить
        </button>
        <button
          type="button"
          onclick="closeEditSubcategoryModal()"
          class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
          Отмена
        </button>
      </div>
    </form>
  </div>
</div>
