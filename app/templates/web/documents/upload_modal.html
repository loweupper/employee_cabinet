<!-- ✅ МОДАЛЬНОЕ ОКНО: Загрузка документа (с множественной загрузкой) -->
<div
  id="uploadDocModal"
  class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  role="dialog"
  aria-modal="true"
  aria-labelledby="uploadModalTitle">
  <div
    class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
    <!-- Заголовок с aria-id -->
    <div class="flex justify-between items-center mb-6">
      <h3 id="uploadModalTitle" class="text-xl font-bold text-gray-800">
        📤 Загрузить документы
      </h3>
      <button
        onclick="closeUploadModal()"
        class="text-gray-500 hover:text-gray-700 text-2xl"
        aria-label="Закрыть модальное окно">
        ×
      </button>
    </div>

    <div class="space-y-4">
      <!-- Раздел — ИСПРАВЛЕНО: добавлен правильный id -->
      <div>
        <label
          for="uploadCategorySelect"
          class="block text-gray-700 font-medium mb-2"
          >Раздел *</label
        >
        <select
          id="uploadCategorySelect"
          required
          onchange="updateSubcategories()"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500">
          <option value="">Выберите раздел</option>
          {% for category in accessible_categories %}
            <option value="{{ category.value }}">
              {{ category.emoji }} {{ category.display_name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Подкатегория -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label
            for="uploadSubcategorySelect"
            class="block text-gray-700 font-medium"
            >Подкатегория</label
          >
          <button
            type="button"
            onclick="openCreateSubcategoryModal()"
            class="text-xs text-indigo-600 hover:text-indigo-700">
            ➕ Новая
          </button>
        </div>
        <select
          id="uploadSubcategorySelect"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-indigo-500">
          <option value="">Без подкатегории</option>
        </select>
      </div>

      <!-- Выбор файлов (скрытый input) -->
      <input
        type="file"
        id="fileInput"
        multiple
        accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg"
        class="hidden"
        aria-label="Выбор файлов для загрузки" />

      <!-- Зона загрузки (drag & drop) -->
      <div>
        <div class="block text-gray-700 font-medium mb-2">Добавить файлы</div>
        <button
          id="dropZone"
          type="button"
          aria-label="Нажмите или перетащите файлы для загрузки"
          onclick="document.getElementById('fileInput').click()"
          class="w-full border-2 border-dashed border-indigo-300 rounded-lg p-6 text-center cursor-pointer hover:bg-indigo-50 transition focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <div class="text-4xl mb-2">📁</div>
          <p class="text-gray-700 font-medium">Нажмите или перетащите файлы</p>
          <p class="text-xs text-gray-500 mt-1">
            PDF, DOCX, XLSX, PNG, JPG (макс. 50 МБ каждый)
          </p>
        </button>
      </div>

      <!-- ✅ СПИСОК ВЫБРАННЫХ ФАЙЛОВ (будет показан после выбора) -->
      <div id="selectedFilesContainer" class="hidden">
        <div class="block text-gray-700 font-medium mb-2">
          📁 Выбранные файлы
        </div>
        <ul
          id="selectedFilesList"
          class="space-y-2 bg-blue-50 p-4 rounded-lg border border-blue-200 max-h-40 overflow-y-auto"
          aria-label="Список выбранных файлов"></ul>
      </div>

      <!-- ✅ СПИСОК ЗАГРУЖЕННЫХ ФАЙЛОВ -->
      <div id="uploadedFilesContainer" class="hidden">
        <div class="block text-gray-700 font-medium mb-2">
          ✅ Загруженные файлы
        </div>
        <ul
          id="uploadedFilesList"
          class="space-y-2 bg-green-50 p-4 rounded-lg border border-green-200 max-h-40 overflow-y-auto"
          aria-label="Список успешно загруженных файлов"></ul>
      </div>

      <!-- Прогресс загрузки -->
      <div id="uploadProgress" class="hidden">
        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-lg">
          <div class="animate-spin text-indigo-600">⏳</div>
          <div class="flex-1">
            <p class="text-sm text-gray-700" id="progressText">
              Загрузка файлов...
            </p>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
              <div
                id="progressBar"
                class="bg-indigo-600 h-2 rounded-full"
                style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Кнопки -->
      <div class="flex gap-4 pt-4">
        <button
          type="button"
          onclick="openFileDialog()"
          class="flex-1 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition focus:ring-2 focus:ring-indigo-500">
          ➕ Добавить файлы
        </button>
        <button
          type="button"
          onclick="closeUploadModal()"
          class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition focus:ring-2 focus:ring-gray-400">
          ✓ Готово
        </button>
      </div>
    </div>
  </div>
</div>
